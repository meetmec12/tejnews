<ion-header class="tej-header">
  <ion-toolbar class="tej-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Contact Us</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="container-detail">
    <h3 class="text-brand mb-4">Contact Us</h3>
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center p-4">
            <div class="mb-4">
              <div class="contact-icon mb-3">
                <ion-icon name="mail"></ion-icon>
              </div>
              <h4 class="text-brand">Send Us A Message</h4>
              <p class="text-muted">If you have any questions, feel free to send us a message. We're here to help!</p>
            </div>
            <a href="mailto:contact@tejcoms.com" class="btn btn-brand btn-lg px-4 py-2">
              <ion-icon name="mail" class="me-2"></ion-icon>contact@tejcoms.com
            </a>
            <div class="mt-4 pt-3 border-top">
            <!--   <p class="small text-muted mb-2">We typically respond within 24-48 hours</p> -->
              <p class="small text-muted">For urgent inquiries, please use the email above</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
