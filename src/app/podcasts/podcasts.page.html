<ion-header class="tej-header">
  <ion-toolbar class="tej-toolbar">
    <ion-title>Podcasts</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="podcasts-container">
    <ion-searchbar placeholder="Search podcasts..." (ionInput)="filterPodcasts($event)"></ion-searchbar>
    
    <ion-grid *ngIf="!loading || podcasts.length > 0">
      <ion-row>
        <ion-col size="12" *ngFor="let podcast of filteredPodcasts">
          <div class="podcast-card" (click)="openPodcast(podcast)">
            <div class="podcast-thumbnail">
              <img [src]="getThumbnail(podcast)" [alt]="podcast.title.rendered" />
              <div class="play-overlay">
                <ion-icon name="play-circle"></ion-icon>
              </div>
            </div>
            <div class="podcast-info">
              <h3 [innerHTML]="podcast.title.rendered"></h3>
              <div class="podcast-meta">
                <span class="date">
                  <ion-icon name="calendar-outline"></ion-icon>
                  {{ podcast.date | date:'MMM d, y' }}
                </span>
                <ion-button fill="clear" class="play-button" (click)="openPodcast(podcast); $event.stopPropagation()">
                  <ion-icon name="play-circle" slot="icon-only"></ion-icon>
                </ion-button>
              </div>
            </div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>

    <div *ngIf="loading && podcasts.length === 0" class="loading-container">
      <ion-spinner></ion-spinner>
      <p>Loading podcasts...</p>
    </div>

    <div *ngIf="!loading && filteredPodcasts.length === 0" class="empty-state">
      <ion-icon name="mic-outline" size="large"></ion-icon>
      <h2>{{ podcasts.length === 0 ? 'No Podcasts Yet' : 'No Results Found' }}</h2>
      <p>{{ podcasts.length === 0 ? 'Check back soon for new episodes!' : 'Try a different search term' }}</p>
    </div>
  </div>

  <ion-infinite-scroll (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
