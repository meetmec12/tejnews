<div class="share-modal-backdrop" (click)="dismiss()">
  <div class="share-card" (click)="$event.stopPropagation()">
    <div class="share-header">
      <h3>Share News</h3>
      <ion-button fill="clear" (click)="dismiss()">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </div>
    
    <div class="share-options">
      <div class="share-option" (click)="shareToFacebook()">
        <div class="share-icon facebook">
          <ion-icon name="logo-facebook"></ion-icon>
        </div>
        <span>Facebook</span>
      </div>
      
      <div class="share-option" (click)="shareToX()">
        <div class="share-icon x-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </div>
        <span>X</span>
      </div>
      
      <div class="share-option" (click)="shareToWhatsApp()">
        <div class="share-icon whatsapp">
          <ion-icon name="logo-whatsapp"></ion-icon>
        </div>
        <span>WhatsApp</span>
      </div>
      
      <div class="share-option" (click)="copyLink()">
        <div class="share-icon copy">
          <ion-icon name="copy-outline"></ion-icon>
        </div>
        <span>Copy Link</span>
      </div>
    </div>
  </div>
</div>
