<ion-app>
  <ion-menu side="start" menuId="main-menu" contentId="main-content">
    <div class="menu-header">
      <h3 class="menu-title">Menu</h3>
      <ion-button fill="clear" (click)="closeMenu()" class="close-menu-btn">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </div>
      <div class="menu-center">
        <img src="assets/img/tejmain.png" alt="TEJ NEWS" class="menu-logo">
      </div>
    <ion-content>
      <ion-list>
        <ion-item routerLink="/tabs/home" routerDirection="root" (click)="closeMenu()">
          <ion-icon name="home" slot="start"></ion-icon>
          <ion-label>Home</ion-label>
        </ion-item>
        
        <ion-item routerLink="/tabs/categories" routerDirection="root" (click)="closeMenu()">
          <ion-icon name="grid" slot="start"></ion-icon>
          <ion-label>Categories</ion-label>
        </ion-item>
        
        <ion-item routerLink="/tabs/live-tv" routerDirection="root" (click)="closeMenu()">
          <ion-icon name="tv" slot="start"></ion-icon>
          <ion-label>Live TV</ion-label>
        </ion-item>
        
        <ion-item routerLink="/tabs/favorites" routerDirection="root" (click)="closeMenu()">
          <ion-icon name="heart" slot="start"></ion-icon>
          <ion-label>Favorites</ion-label>
        </ion-item>
        
        <ion-item routerLink="/about" routerDirection="root" (click)="closeMenu()">
          <ion-icon name="information-circle" slot="start"></ion-icon>
          <ion-label>About Us</ion-label>
        </ion-item>
        
        <ion-item routerLink="/contact" routerDirection="root" (click)="closeMenu()">
          <ion-icon name="mail" slot="start"></ion-icon>
          <ion-label>Contact Us</ion-label>
        </ion-item>
        
        <ion-item routerLink="/settings" routerDirection="root" (click)="closeMenu()">
          <ion-icon name="settings" slot="start"></ion-icon>
          <ion-label>Settings</ion-label>
        </ion-item>
      </ion-list>
      
    
      
      <div class="menu-footer">
        <div class="app-info">
          <img src="assets/img/tejmainicon.png" alt="TEJ" class="footer-icon">
          <h3>TEJ News</h3>
         <!--  <p>Version 1.0.0</p> -->
          <p class="copyright">© {{ currentYear }} The Elite Journal</p>
        </div>
      </div>
    </ion-content>
  </ion-menu>
  
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
